server:
  port: 9527

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/simon_workspace?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true

app:
  cors:
    allowed-origins: http://localhost:9526,http://127.0.0.1:9526
  file-storage:
    root: ./data/files
