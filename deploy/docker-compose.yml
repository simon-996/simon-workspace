services:
  simon-workspace-api:
    image: ${API_IMAGE:-simon-workspace-api:local}
    build:
      context: ../simon-workspace-api
    container_name: simon-workspace-api
    environment:
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: prod
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_URL: ${MYSQL_URL}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USERNAME: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      FLYWAY_ENABLED: true
      APP_FILE_STORAGE_ROOT: /data/files
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS}
    volumes:
      - api-files:/data/files
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${API_PUBLIC_PORT:-9527}:8080"
    networks:
      - simon-workspace-net

  simon-workspace-web:
    image: ${WEB_IMAGE:-simon-workspace-web:local}
    build:
      context: ../simon-workspace-web
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    container_name: simon-workspace-web
    depends_on:
      - simon-workspace-api
    ports:
      - "${WEB_PUBLIC_PORT:-9526}:80"
    networks:
      - simon-workspace-net

  mysql:
    image: mysql:8.4
    container_name: simon-workspace-mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u$${MYSQL_USER} -p$${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "${MYSQL_PUBLIC_PORT:-3306}:3306"
    networks:
      - simon-workspace-net

  redis:
    image: redis:7.4-alpine
    container_name: simon-workspace-redis
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - simon-workspace-net

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: simon-workspace-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - simon-workspace-net

networks:
  simon-workspace-net:
    driver: bridge

volumes:
  api-files:
  mysql-data:
  redis-data:
  minio-data:
