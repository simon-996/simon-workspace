services:
  simon-workspace-api:
    image: ${API_IMAGE:-simon-workspace-api:local}
    build:
      context: ../simon-workspace-api
    container_name: simon-workspace-api
    environment:
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: prod
      MYSQL_HOST: ${MYSQL_HOST}
      MYSQL_PORT: ${MYSQL_PORT}
      MYSQL_URL: ${MYSQL_URL}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USERNAME: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      SPRING_DATA_REDIS_HOST: ${REDIS_HOST}
      SPRING_DATA_REDIS_PORT: ${REDIS_PORT}
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      FLYWAY_ENABLED: true
      APP_FILE_STORAGE_ROOT: /data/files
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS}
    volumes:
      - api-files:/data/files
    ports:
      - "${API_PUBLIC_PORT:-9527}:8080"
    networks:
      - simon-workspace-net

  simon-workspace-web:
    image: ${WEB_IMAGE:-simon-workspace-web:local}
    build:
      context: ../simon-workspace-web
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    container_name: simon-workspace-web
    depends_on:
      - simon-workspace-api
    ports:
      - "${WEB_PUBLIC_PORT:-9526}:80"
    networks:
      - simon-workspace-net

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: simon-workspace-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - simon-workspace-net

networks:
  simon-workspace-net:
    driver: bridge

volumes:
  api-files:
  minio-data:
