services:
  simon-workplace-api:
    image: ${API_IMAGE:-simon-workplace-api:local}
    build:
      context: ../simon-workplace-api
    container_name: simon-workplace-api
    environment:
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: prod
      APP_FILE_STORAGE_ROOT: /data/files
    volumes:
      - api-files:/data/files
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    networks:
      - simon-workplace-net

  simon-workplace-web:
    image: ${WEB_IMAGE:-simon-workplace-web:local}
    build:
      context: ../simon-workplace-web
    container_name: simon-workplace-web
    depends_on:
      - simon-workplace-api
    ports:
      - "80:80"
    networks:
      - simon-workplace-net

  mysql:
    image: mysql:8.4
    container_name: simon-workplace-mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u$${MYSQL_USER} -p$${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "3306:3306"
    networks:
      - simon-workplace-net

  redis:
    image: redis:7.4-alpine
    container_name: simon-workplace-redis
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - simon-workplace-net

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: simon-workplace-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - simon-workplace-net

networks:
  simon-workplace-net:
    driver: bridge

volumes:
  api-files:
  mysql-data:
  redis-data:
  minio-data:
